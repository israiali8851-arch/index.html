name: Build SharePal APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Android build ke liye 17 zyada stable hai

      - name: Force Clean and Setup
        run: |
          npm install
          npm run build
          # Purana android folder delete karke naya banane ka force command
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          # Gradlew ko executable permission dena zaroori hai
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SharePal-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
