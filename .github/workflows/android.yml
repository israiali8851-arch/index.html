<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharePal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: -1; }
        .scanner-container { position: relative; width: 250px; height: 250px; border: 2px solid white; overflow: hidden; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="home-screen" class="min-h-screen flex flex-col items-center justify-center space-y-10">
        <h1 class="text-4xl font-bold text-blue-600 italic">SharePal Pro</h1>
        <div class="flex space-x-6">
            <button onclick="showSelection()" class="bg-blue-600 text-white w-32 h-32 rounded-3xl shadow-xl flex flex-col items-center justify-center">
                <span class="text-4xl mb-1">↑</span><span class="font-bold">SEND</span>
            </button>
            <button onclick="openReceive()" class="bg-green-600 text-white w-32 h-32 rounded-3xl shadow-xl flex flex-col items-center justify-center">
                <span class="text-4xl mb-1">↓</span><span class="font-bold">RECEIVE</span>
            </button>
        </div>
    </div>

    <div id="selection-screen" class="hidden min-h-screen flex flex-col bg-white">
        <div class="p-4 bg-blue-600 text-white flex items-center justify-between">
            <button onclick="goHome()" class="text-xl">←</button>
            <span class="font-bold">Select Files</span>
            <span></span>
        </div>
        <div class="flex overflow-x-auto p-4 space-x-6 border-b">
            <button onclick="switchTab('apps')" id="tab-apps">APPS</button>
            <button onclick="switchTab('videos')" id="tab-videos" class="active-tab">VIDEOS</button>
            <button onclick="switchTab('photos')" id="tab-photos">PHOTOS</button>
            <button onclick="switchTab('music')" id="tab-music">MUSIC</button>
        </div>
        <div id="file-list" class="flex-1 p-4 grid grid-cols-3 gap-4 overflow-y-auto bg-gray-50 text-black">
            </div>
        <div class="p-4 border-t flex justify-between items-center bg-white">
            <span id="selected-count" class="font-bold text-black">Selected: 0</span>
            <button onclick="openScanner()" class="bg-blue-600 text-white px-10 py-2 rounded-full font-bold">NEXT (SCAN)</button>
        </div>
    </div>

    <div id="receive-screen" class="hidden min-h-screen flex flex-col items-center justify-center bg-white p-6">
        <h2 class="text-2xl font-bold mb-8">Scan to Connect</h2>
        <div id="qrcode" class="p-4 border-4 border-blue-100 rounded-xl"></div>
        <button onclick="goHome()" class="mt-12 text-red-500 font-bold">CANCEL</button>
    </div>

    <div id="scanner-screen" class="hidden min-h-screen bg-black flex flex-col items-center justify-center relative">
        <video id="video"></video>
        <div class="scanner-container">
            <div class="absolute inset-0 border-2 border-blue-400 opacity-50"></div>
        </div>
        <p class="text-white mt-4 z-10">Align QR Code inside the box</p>
        <button onclick="goHome()" class="mt-10 bg-white text-black px-8 py-2 rounded-lg z-10 font-bold">BACK</button>
    </div>

    <script>
        const { Filesystem, Directory } = capacitorExports.Filesystem;
        let selectedCount = 0;

        function goHome() { location.reload(); }

        // App khulte hi Permission mangna
        window.onload = async () => {
            try {
                await Filesystem.requestPermissions();
            } catch (e) { console.log("Permission system not ready"); }
        };

        function showSelection() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('selection-screen').classList.remove('hidden');
            switchTab('videos');
        }

        async function switchTab(tab) {
            ['apps', 'videos', 'photos', 'music'].forEach(t => {
                document.getElementById('tab-'+t).className = (t === tab) ? 'active-tab' : '';
            });

            const list = document.getElementById('file-list');
            list.innerHTML = '<p class="col-span-3 text-center py-10">Scanning Storage...</p>';

            try {
                let folder = (tab === 'videos') ? 'DCIM/Camera' : (tab === 'photos') ? 'Pictures' : 'Music';
                
                const result = await Filesystem.readdir({
                    path: folder,
                    directory: Directory.ExternalStorage
                });

                list.innerHTML = '';
                if (result.files.length === 0) {
                    list.innerHTML = `<p class="col-span-3 text-center py-10 text-gray-500">No ${tab} found.</p>`;
                }

                result.files.forEach(file => {
                    list.innerHTML += `
                        <div class="bg-white p-2 rounded-lg shadow border border-gray-200 relative flex flex-col items-center">
                            <div class="w-full h-12 bg-blue-50 rounded flex items-center justify-center mb-1">
                                <span class="text-[10px] text-blue-400 font-bold">${tab.toUpperCase()}</span>
                            </div>
                            <p class="text-[9px] truncate w-full text-center text-black font-medium">${file.name}</p>
                            <input type="checkbox" onchange="updateCount(this)" class="absolute top-1 right-1 w-5 h-5 accent-blue-600">
                        </div>`;
                });
            } catch (e) {
                list.innerHTML = '<div class="col-span-3 text-center p-4 text-red-500 text-xs font-bold">Error: Go to Phone Settings > Apps > SharePal Pro > Permissions and ALLOW Storage/Media.</div>';
            }
        }

        function updateCount(cb) {
            selectedCount += cb.checked ? 1 : -1;
            document.getElementById('selected-count').innerText = "Selected: " + selectedCount;
        }

        function openReceive() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('receive-screen').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), "SHAREPAL-PRO-" + Math.random().toString(36).substr(2, 5));
        }

        async function openScanner() {
            if(selectedCount === 0) { alert("Pehle file select karo bhai!"); return; }
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('scanner-screen').classList.remove('hidden');
            
            try {
                const codeReader = new ZXing.BrowserQRCodeReader();
                const videoElement = document.getElementById('video');
                
                codeReader.decodeFromVideoDevice(null, videoElement, (result, err) => {
                    if (result) {
                        alert("Connected to: " + result.text);
                        goHome();
                    }
                });
            } catch (err) {
                alert("Camera error: " + err);
            }
        }
    </script>
</body>
</html>

