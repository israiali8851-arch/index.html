name: Build SharePal APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install & Build Web App
      - name: Install Dependencies
        run: |
          npm install
          npm run build

      # Add Android Platform
      - name: Setup Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      # 🔥 Inject ALL required permissions
      - name: Add Android Permissions
        run: |
          sed -i '/<manifest/a\
          <uses-permission android:name="android.permission.INTERNET"/>\
          <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\
          <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>\
          <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>\
          <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE"/>\
          <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\
          <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\
          <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\
          <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\
          <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>' android/app/src/main/AndroidManifest.xml

      # Build APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SharePal-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
