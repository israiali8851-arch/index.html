name: Build SharePal APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm install
          npm run build

      - name: Setup Capacitor Android
        run: |
          npx cap add android || echo "Android already added"
          npx cap sync android

      - name: Build APK
        run: |
          # Agar robot ko android folder milta hai tabhi build karega
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "Error: Android folder not found. Capacitor sync failed."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sharepal-pro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      
