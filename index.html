<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharePal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body class="bg-gray-100 text-black">

    <div id="home-screen" class="min-h-screen flex flex-col items-center justify-center space-y-10">
        <h1 class="text-4xl font-bold text-blue-600 italic">SharePal Pro</h1>
        <div class="flex space-x-6">
            <button onclick="showSelection()" class="bg-blue-600 text-white w-32 h-32 rounded-3xl shadow-xl flex flex-col items-center justify-center">
                <span class="text-4xl">↑</span><span class="font-bold">SEND</span>
            </button>
            <button onclick="openReceive()" class="bg-green-600 text-white w-32 h-32 rounded-3xl shadow-xl flex flex-col items-center justify-center">
                <span class="text-4xl">↓</span><span class="font-bold">RECEIVE</span>
            </button>
        </div>
    </div>

    <div id="selection-screen" class="hidden min-h-screen flex flex-col bg-white">
        <div class="p-4 bg-blue-600 text-white flex items-center justify-between">
            <button onclick="goHome()" class="text-xl">←</button>
            <span class="font-bold">Select Files</span>
            <span></span>
        </div>
        <div class="flex overflow-x-auto p-4 space-x-6 border-b text-gray-500">
            <button onclick="switchTab('apps')" id="tab-apps">APPS</button>
            <button onclick="switchTab('videos')" id="tab-videos">VIDEOS</button>
            <button onclick="switchTab('photos')" id="tab-photos">PHOTOS</button>
            <button onclick="switchTab('music')" id="tab-music">MUSIC</button>
        </div>
        <div id="file-list" class="flex-1 p-4 grid grid-cols-3 gap-4 overflow-y-auto bg-gray-50">
            </div>
        <div class="p-4 border-t flex justify-between items-center bg-white">
            <span id="selected-count" class="font-bold">Selected: 0</span>
            <button onclick="openScanner()" class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold">NEXT</button>
        </div>
    </div>

    <script>
        let Filesystem, Directory;
        let selectedCount = 0;

        function goHome() { location.reload(); }

        // Bulletproof Initialization
        async function initSystem() {
            return new Promise((resolve) => {
                const check = setInterval(() => {
                    // Capacitor ke alag alag versions ke liye check
                    const cap = window.Capacitor || (window.capacitorExports ? {Plugins: window.capacitorExports} : null);
                    if (cap && cap.Plugins && cap.Plugins.Filesystem) {
                        Filesystem = cap.Plugins.Filesystem;
                        Directory = cap.Plugins.Directory;
                        clearInterval(check);
                        resolve(true);
                    }
                }, 100);
                // 5 second baad haar maan lena (Timeout)
                setTimeout(() => { clearInterval(check); resolve(false); }, 5000);
            });
        }

        window.onload = () => { initSystem(); };

        async function showSelection() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('selection-screen').classList.remove('hidden');
            
            const ready = await initSystem();
            if (ready) {
                try { await Filesystem.requestPermissions(); } catch(e) {}
                switchTab('videos');
            } else {
                document.getElementById('file-list').innerHTML = '<p class="col-span-3 text-center py-10 text-red-500">Error: System not responding. Restart App.</p>';
            }
        }

        async function switchTab(tab) {
            ['apps', 'videos', 'photos', 'music'].forEach(t => {
                document.getElementById('tab-'+t).className = (t === tab) ? 'active-tab' : '';
            });

            const list = document.getElementById('file-list');
            list.innerHTML = '<p class="col-span-3 text-center py-10">Scanning Files...</p>';

            try {
                let folder = (tab === 'videos' || tab === 'photos') ? 'DCIM/Camera' : (tab === 'music') ? 'Music' : 'Download';
                
                const result = await Filesystem.readdir({
                    path: folder,
                    directory: Directory.ExternalStorage
                });

                list.innerHTML = '';
                if (!result.files || result.files.length === 0) {
                    list.innerHTML = `<p class="col-span-3 text-center py-10 text-gray-400 italic">No files in ${folder}</p>`;
                    return;
                }

                result.files.forEach(file => {
                    list.innerHTML += `
                        <div class="bg-white p-2 rounded-lg shadow border border-gray-100 relative flex flex-col items-center">
                            <div class="w-full h-12 bg-blue-50 rounded flex items-center justify-center mb-1">
                                <span class="text-[8px] text-blue-400 font-bold">${tab.toUpperCase()}</span>
                            </div>
                            <p class="text-[8px] truncate w-full text-center font-medium">${file.name}</p>
                            <input type="checkbox" onchange="updateCount(this)" class="absolute top-1 right-1 w-4 h-4 accent-blue-600">
                        </div>`;
                });
            } catch (e) {
                list.innerHTML = `<div class="col-span-3 text-center p-4">
                    <p class="text-red-500 text-[10px] font-bold">Error: ${e.message}</p>
                    <button onclick="switchTab('${tab}')" class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] mt-2">Try Again</button>
                </div>`;
            }
        }

        function updateCount(cb) {
            selectedCount += cb.checked ? 1 : -1;
            document.getElementById('selected-count').innerText = "Selected: " + selectedCount;
        }

        function openReceive() {
            document.getElementById('home-screen').classList.add('hidden');
            // QR Logic...
        }
    </script>
</body>
</html>
