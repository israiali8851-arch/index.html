<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SharePal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
    <style>
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: -1; }
        .scanner-container { position: relative; width: 250px; height: 250px; border: 2px solid white; overflow: hidden; border-radius: 20px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="home-screen" class="min-h-screen flex flex-col items-center justify-center space-y-10">
        <h1 class="text-4xl font-bold text-blue-600 italic">SharePal Pro</h1>
        <div class="flex space-x-6">
            <button onclick="showSelection()" class="bg-blue-600 text-white w-32 h-32 rounded-3xl shadow-xl flex flex-col items-center justify-center">
                <span class="text-4xl mb-1 text-white">↑</span><span class="font-bold text-white">SEND</span>
            </button>
            <button onclick="openReceive()" class="bg-green-600 text-white w-32 h-32 rounded-3xl shadow-xl flex flex-col items-center justify-center">
                <span class="text-4xl mb-1 text-white">↓</span><span class="font-bold text-white">RECEIVE</span>
            </button>
        </div>
    </div>

    <div id="selection-screen" class="hidden min-h-screen flex flex-col bg-white">
        <div class="p-4 bg-blue-600 text-white flex items-center justify-between">
            <button onclick="goHome()" class="text-xl">←</button>
            <span class="font-bold">Select Files</span>
            <span></span>
        </div>
        <div class="flex overflow-x-auto p-4 space-x-6 border-b text-gray-600">
            <button onclick="switchTab('apps')" id="tab-apps">APPS</button>
            <button onclick="switchTab('videos')" id="tab-videos">VIDEOS</button>
            <button onclick="switchTab('photos')" id="tab-photos">PHOTOS</button>
            <button onclick="switchTab('music')" id="tab-music">MUSIC</button>
        </div>
        <div id="file-list" class="flex-1 p-4 grid grid-cols-3 gap-4 overflow-y-auto bg-gray-50 text-black">
            </div>
        <div class="p-4 border-t flex justify-between items-center bg-white">
            <span id="selected-count" class="font-bold text-black text-sm">Selected: 0</span>
            <button onclick="openScanner()" class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold text-sm">NEXT (SCAN)</button>
        </div>
    </div>

    <div id="scanner-screen" class="hidden min-h-screen bg-black flex flex-col items-center justify-center relative">
        <video id="video"></video>
        <div class="scanner-container">
            <div class="absolute inset-0 border-2 border-blue-400 opacity-50"></div>
        </div>
        <p class="text-white mt-4 z-10">Align QR Code inside the box</p>
        <button onclick="goHome()" class="mt-10 bg-white text-black px-8 py-2 rounded-lg z-10 font-bold">BACK</button>
    </div>

    <div id="receive-screen" class="hidden min-h-screen flex flex-col items-center justify-center bg-white p-6">
        <h2 class="text-2xl font-bold mb-8 text-black">Scan to Connect</h2>
        <div id="qrcode" class="p-4 border-4 border-blue-100 rounded-xl"></div>
        <button onclick="goHome()" class="mt-12 text-red-500 font-bold">CANCEL</button>
    </div>

    <script>
    let Filesystem, Directory;
    let selectedCount = 0;

    function goHome() { location.reload(); }

    // Sabse tagda initialization jo naye phones ke liye hai
    window.onload = async () => {
        const checkCapacitor = setInterval(async () => {
            // Check karein ki kya Capacitor load ho gaya hai
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) {
                Filesystem = window.Capacitor.Plugins.Filesystem;
                Directory = window.Capacitor.Plugins.Directory;
                
                console.log("Capacitor Ready!");
                clearInterval(checkCapacitor); // Loop band karein

                try {
                    // Naye phones ke liye permission request
                    await Filesystem.requestPermissions();
                } catch (e) {
                    console.log("Permission Error:", e);
                }
            }
        }, 100); // Har 100ms mein check karega
    };

    function showSelection() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('selection-screen').classList.remove('hidden');
        
        // Tab tak wait karein jab tak Filesystem variable bhar na jaye
        const waitInit = setInterval(() => {
            if (Filesystem && Directory) {
                clearInterval(waitInit);
                switchTab('videos');
            }
        }, 100);
    }

    async function switchTab(tab) {
        ['apps', 'videos', 'photos', 'music'].forEach(t => {
            const el = document.getElementById('tab-'+t);
            if(el) el.className = (t === tab) ? 'active-tab' : '';
        });

        const list = document.getElementById('file-list');
        list.innerHTML = '<p class="col-span-3 text-center py-10 text-black font-bold">Scanning...</p>';

        // Yahan Error handling tagdi kar di hai
        if (!Filesystem || !Directory) {
            list.innerHTML = '<p class="col-span-3 text-center py-10 text-red-500 text-xs">System starting... please wait 2 seconds.</p>';
            return;
        }

        try {
            let folder = '';
            // Naye Android (11+) mein standard paths
            if (tab === 'videos') folder = 'DCIM/Camera';
            else if (tab === 'photos') folder = 'Pictures';
            else if (tab === 'music') folder = 'Music';
            else folder = 'Download';

            const result = await Filesystem.readdir({
                path: folder,
                directory: Directory.ExternalStorage // Ab ye undefined nahi aayega
            });

            list.innerHTML = '';
            if (!result.files || result.files.length === 0) {
                list.innerHTML = `<p class="col-span-3 text-center py-10 text-gray-500 italic">No files in ${folder}</p>`;
                return;
            }

            result.files.forEach(file => {
                list.innerHTML += `
                    <div class="bg-white p-2 rounded-lg shadow border border-gray-200 relative flex flex-col items-center">
                        <div class="w-full h-12 bg-blue-50 rounded flex items-center justify-center mb-1">
                            <span class="text-[8px] text-blue-400 font-bold">${tab.toUpperCase()}</span>
                        </div>
                        <p class="text-[8px] truncate w-full text-center text-black font-medium">${file.name}</p>
                        <input type="checkbox" onchange="updateCount(this)" class="absolute top-1 right-1 w-4 h-4 accent-blue-600">
                    </div>`;
            });
        } catch (e) {
            list.innerHTML = `<div class="col-span-3 text-center p-4">
                <p class="text-red-500 text-[10px] font-bold">Error: ${e.message}</p>
                <button onclick="switchTab('${tab}')" class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] mt-2">Retry</button>
            </div>`;
        }
    }

    function updateCount(cb) {
        selectedCount += cb.checked ? 1 : -1;
        document.getElementById('selected-count').innerText = "Selected: " + selectedCount;
    }

    function openReceive() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('receive-screen').classList.remove('hidden');
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), "SHAREPAL-" + Math.random().toString(36).substr(2, 4));
    }

    async function openScanner() {
        document.getElementById('selection-screen').classList.add('hidden');
        document.getElementById('scanner-screen').classList.remove('hidden');
        try {
            const codeReader = new ZXing.BrowserQRCodeReader();
            codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                if (result) { alert("Connected!"); goHome(); }
            });
        } catch (e) { alert("Camera error"); }
    }
</script>
