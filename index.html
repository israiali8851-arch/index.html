<script>
    let Filesystem;
    // Naye version ke liye Directory ko fix kiya
    const Directory = {
        ExternalStorage: 'EXTERNAL_STORAGE',
        Documents: 'DOCUMENTS',
        Data: 'DATA',
        Cache: 'CACHE',
        External: 'EXTERNAL'
    };
    let selectedCount = 0;

    function goHome() { location.reload(); }

    window.onload = () => {
        const check = setInterval(() => {
            // Capacitor check karne ka sahi tarika
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Filesystem) {
                Filesystem = window.Capacitor.Plugins.Filesystem;
                clearInterval(check);
                console.log("Filesystem Ready");
            }
        }, 100);
    };

    async function showSelection() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('selection-screen').classList.remove('hidden');
        
        // Wait for system
        if (!Filesystem) {
            let count = 0;
            const wait = setInterval(async () => {
                count++;
                if (Filesystem || count > 20) {
                    clearInterval(wait);
                    if (Filesystem) {
                        try { await Filesystem.requestPermissions(); } catch(e){}
                        switchTab('videos');
                    }
                }
            }, 200);
        } else {
            try { await Filesystem.requestPermissions(); } catch(e){}
            switchTab('videos');
        }
    }

    async function switchTab(tab) {
        ['apps', 'videos', 'photos', 'music'].forEach(t => {
            const el = document.getElementById('tab-'+t);
            if(el) el.className = (t === tab) ? 'active-tab border-b-2 border-blue-600' : '';
        });

        const list = document.getElementById('file-list');
        list.innerHTML = '<p class="col-span-3 text-center py-10">Scanning...</p>';

        if (!Filesystem) {
            list.innerHTML = '<p class="col-span-3 text-center py-10 text-red-500">System not ready. Tap Try Again.</p>';
            return;
        }

        try {
            let folder = (tab === 'videos' || tab === 'photos') ? 'DCIM/Camera' : (tab === 'music') ? 'Music' : 'Download';
            
            const result = await Filesystem.readdir({
                path: folder,
                directory: 'EXTERNAL_STORAGE' // Direct string use ki taaki undefined na aaye
            });

            list.innerHTML = '';
            if (!result.files || result.files.length === 0) {
                list.innerHTML = `<p class="col-span-3 text-center py-10 text-gray-500 text-xs">No files in ${folder}</p>`;
                return;
            }

            result.files.forEach(file => {
                list.innerHTML += `
                    <div class="bg-white p-2 rounded shadow border border-gray-100 relative flex flex-col items-center">
                        <div class="w-full h-10 bg-blue-50 rounded mb-1 flex items-center justify-center">
                            <span class="text-[8px] text-blue-400 font-bold">${tab.toUpperCase()}</span>
                        </div>
                        <p class="text-[8px] truncate w-full text-center text-black">${file.name}</p>
                        <input type="checkbox" onchange="updateCount(this)" class="absolute top-1 right-1 w-4 h-4 accent-blue-600">
                    </div>`;
            });
        } catch (e) {
            list.innerHTML = `<div class="col-span-3 text-center p-4">
                <p class="text-red-500 text-[10px]">Error: ${e.message}</p>
                <button onclick="switchTab('${tab}')" class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] mt-2">Try Again</button>
            </div>`;
        }
    }

    function updateCount(cb) {
        selectedCount += cb.checked ? 1 : -1;
        document.getElementById('selected-count').innerText = "Selected: " + selectedCount;
    }
</script>
